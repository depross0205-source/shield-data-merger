<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>矛與盾 — 歷史數據整併工具</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;600;700&display=swap');
  
  :root {
    --bg: #0a0c10; --surface: #12161f; --border: #252d3d;
    --text: #e2eaf8; --muted: #6b7a99; --green: #00e5a0;
    --accent: #7eb8ff; --red: #ff4d6d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg); color: var(--text);
    padding: 40px 20px; line-height: 1.6;
  }
  .wrap { max-width: 700px; margin: 0 auto; }
  .hdr-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
  .hdr-sub { font-size: 14px; color: var(--muted); margin-bottom: 32px; }
  
  .upload-grid {
    display: flex; flex-direction: column; gap: 16px; margin-bottom: 32px;
  }
  .file-box {
    background: var(--surface); border: 1px solid var(--border);
    padding: 16px 20px; border-radius: 4px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .file-box .info { display: flex; flex-direction: column; }
  .file-box .name { font-weight: 600; font-size: 15px; color: var(--accent); }
  .file-box .desc { font-size: 12px; color: var(--muted); margin-top: 4px; font-family: 'IBM Plex Mono', monospace;}
  
  input[type="file"] {
    font-size: 13px; color: var(--text);
    background: var(--bg); border: 1px solid var(--border);
    padding: 6px; border-radius: 3px; cursor: pointer;
  }
  input[type="file"]::-webkit-file-upload-button {
    background: var(--border); color: var(--text);
    border: none; padding: 6px 12px; cursor: pointer; font-family: inherit;
  }
  
  .btn {
    display: block; width: 100%; padding: 14px; font-size: 16px; font-weight: 700;
    background: var(--green); color: #000; border: none; border-radius: 4px;
    cursor: pointer; transition: 0.2s; font-family: inherit; text-align: center;
  }
  .btn:hover { background: #00ffb3; }
  .btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

  #log {
    margin-top: 24px; padding: 16px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 4px;
    font-family: 'IBM Plex Mono', monospace; font-size: 12px;
    color: var(--green); white-space: pre-wrap; display: none;
  }
  .err { color: var(--red); }
</style>
</head>
<body>

<div class="wrap">
  <div class="hdr-title">🛡️ 歷史數據整併工具</div>
  <div class="hdr-sub">將多個 CSV 檔上傳，系統將以 SP500 日期為基準，自動進行月度數據的線性插值與對齊，並匯出完整大表。</div>

  <div class="upload-grid">
    <div class="file-box">
      <div class="info">
        <span class="name">1. SP500 (日資料)</span>
        <span class="desc">格式: YYYY-MM-DD, 數值</span>
      </div>
      <input type="file" id="f_sp" accept=".csv">
    </div>
    <div class="file-box">
      <div class="info">
        <span class="name">2. HY Spread (月資料)</span>
        <span class="desc">格式: YYYY-MM, 數值</span>
      </div>
      <input type="file" id="f_hy" accept=".csv">
    </div>
    <div class="file-box">
      <div class="info">
        <span class="name">3. TIPS 10Y (月資料)</span>
        <span class="desc">格式: YYYY-MM, 數值</span>
      </div>
      <input type="file" id="f_tips" accept=".csv">
    </div>
    <div class="file-box">
      <div class="info">
        <span class="name">4. VIX (月資料)</span>
        <span class="desc">格式: YYYY-MM, 數值</span>
      </div>
      <input type="file" id="f_vix" accept=".csv">
    </div>
    <div class="file-box">
      <div class="info">
        <span class="name">5. CAPE (月資料)</span>
        <span class="desc">格式: YYYY-MM, 數值</span>
      </div>
      <input type="file" id="f_cape" accept=".csv">
    </div>
  </div>

  <button class="btn" id="btnMerge" onclick="processMerge()">⬇ 執行合併並下載 CSV</button>
  <div id="log"></div>
</div>

<script>
// 讀取檔案轉為陣列的輔助函數
function readFileAsCSV(file) {
  return new Promise((resolve, reject) => {
    if (!file) { reject("未選擇檔案"); return; }
    const reader = new FileReader();
    reader.onload = (e) => {
      const lines = e.target.result.trim().split('\n');
      const data = [];
      for (let i = 1; i < lines.length; i++) { // 跳過第一行 Header
        const parts = lines[i].trim().split(',');
        if (parts.length >= 2) {
          data.push([parts[0], parseFloat(parts[1])]);
        }
      }
      resolve(data);
    };
    reader.onerror = () => reject("讀取失敗");
    reader.readAsText(file);
  });
}

// 線性插值函數 (給 HY, TIPS, VIX 使用)
function interpolate(targetDateStr, anchorData) {
  const targetTime = new Date(targetDateStr).getTime();
  
  for (let i = 0; i < anchorData.length - 1; i++) {
    // 判斷日期格式是 YYYY-MM 還是 YYYY-MM-DD
    const d0Str = anchorData[i][0].length === 7 ? anchorData[i][0] + '-01' : anchorData[i][0];
    const d1Str = anchorData[i+1][0].length === 7 ? anchorData[i+1][0] + '-01' : anchorData[i+1][0];
    
    const t0 = new Date(d0Str).getTime();
    const t1 = new Date(d1Str).getTime();
    
    if (targetTime >= t0 && targetTime < t1) {
      const ratio = (targetTime - t0) / (t1 - t0);
      return anchorData[i][1] + ratio * (anchorData[i+1][1] - anchorData[i][1]);
    }
  }
  
  // 若超出範圍，取最前或最後的數值 (Forward/Backward Fill)
  const tFirst = new Date(anchorData[0][0].length === 7 ? anchorData[0][0] + '-01' : anchorData[0][0]).getTime();
  if (targetTime < tFirst) return anchorData[0][1];
  return anchorData[anchorData.length - 1][1];
}

// 階梯函數 (給 CAPE 使用，同月份直接對應)
function getStepValue(targetDateStr, anchorData) {
  const ym = targetDateStr.slice(0, 7);
  let bestVal = anchorData[0][1];
  for (let i = 0; i < anchorData.length; i++) {
    if (anchorData[i][0] <= ym) {
      bestVal = anchorData[i][1];
    } else {
      break;
    }
  }
  return bestVal;
}

function printLog(msg, isErr = false) {
  const el = document.getElementById('log');
  el.style.display = 'block';
  el.innerHTML += `<div class="${isErr ? 'err' : ''}">${msg}</div>`;
}

async function processMerge() {
  document.getElementById('log').innerHTML = '';
  document.getElementById('log').style.display = 'none';
  
  const f_sp = document.getElementById('f_sp').files[0];
  const f_hy = document.getElementById('f_hy').files[0];
  const f_tips = document.getElementById('f_tips').files[0];
  const f_vix = document.getElementById('f_vix').files[0];
  const f_cape = document.getElementById('f_cape').files[0];

  if (!f_sp || !f_hy || !f_tips || !f_vix || !f_cape) {
    printLog('錯誤：請確認 5 個欄位皆已選取 CSV 檔案。', true);
    return;
  }

  try {
    printLog('正在讀取檔案...');
    const [spData, hyData, tipsData, vixData, capeData] = await Promise.all([
      readFileAsCSV(f_sp), readFileAsCSV(f_hy), readFileAsCSV(f_tips),
      readFileAsCSV(f_vix), readFileAsCSV(f_cape)
    ]);

    printLog(`讀取完成。基準日資料(SP500)共 ${spData.length} 筆。`);
    printLog('正在進行時間序列對齊與線性插值運算...');

    let csvContent = "Date,SP500,HY_Spread,TIPS_10Y,VIX,CAPE\n";

    // 以 SP500 的日期作為主迴圈
    for (let i = 0; i < spData.length; i++) {
      const d = spData[i][0];
      const sp = spData[i][1].toFixed(4);
      
      const hy = interpolate(d, hyData).toFixed(2);
      const tips = interpolate(d, tipsData).toFixed(2);
      const vix = interpolate(d, vixData).toFixed(1);
      const cape = getStepValue(d, capeData).toFixed(2);

      csvContent += `${d},${sp},${hy},${tips},${vix},${cape}\n`;
    }

    printLog('合併完成！正在觸發下載...');

    // 觸發下載
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    const url = URL.createObjectURL(blob);
    link.setAttribute("href", url);
    link.setAttribute("download", "Shield_Merged_Database.csv");
    link.style.visibility = 'hidden';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    
    printLog('✅ 下載已啟動。');

  } catch (error) {
    printLog('發生錯誤：' + error, true);
  }
}
</script>

</body>
</html>
