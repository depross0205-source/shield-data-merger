<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>🛡️ 矛與盾 V11 FINAL</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{background:#0a0c10;color:#e2eaf8;font-family:sans-serif;padding:20px}
.card{background:#12161f;border:1px solid #252d3d;padding:10px;margin-bottom:10px}
button{padding:8px 12px;font-weight:bold;cursor:pointer}
</style>
</head>
<body>

<h2>🛡️⚔️ V11 FINAL（Macro + MOM + Trend）</h2>

<div class="card">
<input type="file" id="csv">
<button onclick="run()">▶ Run Backtest</button>
</div>

<div class="card" id="metrics"></div>
<canvas id="nav" height="200"></canvas>
<canvas id="dd" height="150"></canvas>

<script>
let DB=[];

document.getElementById('csv').onchange=e=>{
  const f=e.target.files[0];
  const r=new FileReader();
  r.onload=ev=>{
    const l=ev.target.result.split('\n').slice(1);
    DB=l.map(x=>{
      const c=x.split(',');
      return {
        d:new Date(c[0]),
        sp:+c[1],
        cape:+c[2],
        hy:+c[3],
        tips:+c[4],
        y10:+c[5],
        y2:+c[6]
      }
    }).filter(x=>x.sp);
  }
  r.readAsText(f);
}

const lp=(x,x0,x1,y0,y1)=>y0+(y1-y0)*Math.max(0,Math.min(1,(x-x0)/(x1-x0)));

function MA(arr, n, i){
  if(i<n) return arr[i];
  let s=0;
  for(let k=0;k<n;k++) s+=arr[i-k];
  return s/n;
}

function run(){

let eq=100000, bh=100000;
let curve=[], ddSeries=[], returns=[];
let peak=eq, peakBH=bh;

const freq=12;
const cost=0.002;

let prices = DB.map(x=>x.sp);

for(let i=12;i<DB.length;i++){

  const r=(prices[i]-prices[i-1])/prices[i-1];
  returns.push(r);

  // ===== Macro Score =====
  const fVal=lp(100/DB[i].cape-DB[i].tips,0,4,10,100);
  const fCredit=lp(DB[i].hy*100,250,600,80,20);
  const yc=DB[i].y10-DB[i].y2;
  const fCurve=lp(yc,-1,2,20,100);

  const score=0.35*fVal+0.35*fCredit+0.3*fCurve;

  let regime =
    score>=60?'ON':
    score>=40?'MID':'OFF';

  // ===== Trend =====
  const ma10 = MA(prices,10,i);
  const trend = prices[i] > ma10;

  // ===== Momentum（簡化：用 SPY 自己）=====
  let exposure=0;

  if(regime==='OFF'){
    exposure=0;
  }else{
    if(!trend){
      exposure=0.3; // 防守（類債）
    }else{
      exposure=1.0; // 進攻
    }
  }

  // ===== Apply =====
  eq *= (1 + exposure*r - cost);
  bh *= (1 + r);

  peak = Math.max(peak, eq);
  peakBH = Math.max(peakBH, bh);

  ddSeries.push({
    A:(eq/peak-1),
    BH:(bh/peakBH-1)
  });

  curve.push({d:DB[i].d,A:eq,BH:bh});
}

// ===== Metrics =====
function calc(series, returns){
  const years = series.length/12;
  const cagr = Math.pow(series.at(-1)/series[0],1/years)-1;

  let peak=series[0], dd=0;
  for(let v of series){
    peak=Math.max(peak,v);
    dd=Math.min(dd,(v/peak-1));
  }

  const avg = returns.reduce((a,b)=>a+b,0)/returns.length;
  const std = Math.sqrt(returns.map(x=>(x-avg)**2).reduce((a,b)=>a+b)/returns.length);
  const sharpe = (avg*12)/(std*Math.sqrt(12));

  return {cagr,dd,sharpe};
}

const m=calc(curve.map(x=>x.A), returns);
const mbh=calc(curve.map(x=>x.BH), returns);

document.getElementById('metrics').innerHTML=`
📊 Frequency: Monthly<br><br>
🟡 CAGR: ${(m.cagr*100).toFixed(1)}%<br>
🟡 MaxDD: ${(m.dd*100).toFixed(1)}%<br>
🟡 Sharpe: ${m.sharpe.toFixed(2)}<br><br>
⚫ BH CAGR: ${(mbh.cagr*100).toFixed(1)}%<br>
⚫ BH MaxDD: ${(mbh.dd*100).toFixed(1)}%
`;

// ===== Chart =====
new Chart(nav.getContext('2d'),{
  type:'line',
  data:{
    labels:curve.map(x=>x.d.toISOString().slice(0,10)),
    datasets:[
      {label:'Strategy',data:curve.map(x=>x.A)},
      {label:'B&H',data:curve.map(x=>x.BH)}
    ]
  }
});

new Chart(dd.getContext('2d'),{
  type:'line',
  data:{
    labels:curve.map(x=>x.d.toISOString().slice(0,10)),
    datasets:[
      {label:'A DD',data:ddSeries.map(x=>x.A)},
      {label:'BH DD',data:ddSeries.map(x=>x.BH)}
    ]
  }
});

}
</script>

</body>
</html>
