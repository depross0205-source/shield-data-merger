<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>矛與盾 V8.2 實戰版</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{background:#0a0c10;color:#e2eaf8;font-family:sans-serif;padding:20px}
.panel{background:#12161f;padding:15px;margin-bottom:15px;border:1px solid #333}
button{padding:8px 16px;margin:6px}
input{margin:4px}
</style>
</head>
<body>
<h2>🛡️ 矛與盾 V8.2（實戰版）</h2>
<div class="panel">
<h3>🔑 API 設定</h3>
FRED Key: <input id="fred" value="YOUR_KEY"><br>
Proxy: <input id="proxy" value="https://shield-proxy.depross0205.workers.dev?url=" size="60">
</div>
<div class="panel">
<h3>⚙ 模組開關</h3>
<label><input type="checkbox" id="useRegime" checked> Regime</label>
<label><input type="checkbox" id="useV8" checked> V8</label>
<label><input type="checkbox" id="useYC" checked> YC</label>
<label><input type="checkbox" id="useVol"> Vol</label>
</div>
<div class="panel">
<button onclick="fetchData()">📡 抓資料</button>
<button onclick="run()">▶ 回測</button>
</div>
<script>

// ===== 全域 =====
let SP=[], HY=[], VIX=[], TIPS=[], CAPE=[];
let Y10=[], Y2=[];

// ===== 工具 =====
const getUrl = (u)=>document.getElementById("proxy").value + encodeURIComponent(u);

async function getFred(id){
  let key=document.getElementById("fred").value;
  let url=getUrl(`https://api.stlouisfed.org/fred/series/observations?series_id=${id}&api_key=${key}&file_type=json`);
  let r=await fetch(url); let j=await r.json();
  let d={};
  j.observations.forEach(o=>{
    if(o.value!==".") d[o.date]=parseFloat(o.value);
  });
  return d;
}

async function getYF(t){
  let url=getUrl(`https://query1.finance.yahoo.com/v8/finance/chart/${t}?range=5y&interval=1d`);
  let r=await fetch(url); let j=await r.json();
  let d={};
  let tms=j.chart.result[0].timestamp;
  let cls=j.chart.result[0].indicators.quote[0].close;
  for(let i=0;i<tms.length;i++){
    if(cls[i]){
      let dt=new Date(tms[i]*1000).toISOString().slice(0,10);
      d[dt]=cls[i];
    }
  }
  return d;
}

// ===== 抓資料 =====
async function fetchData(){

alert("抓資料中...");

let [sp,hy,vix,tips,y10,y2] = await Promise.all([
  getYF("^GSPC"),
  getFred("BAMLH0A0HYM2"),
  getYF("^VIX"),
  getFred("DFII10"),
  getFred("DGS10"),
  getFred("DGS2")
]);

let dates=Object.keys(sp).sort();

SP=[];HY=[];VIX=[];TIPS=[];Y10=[];Y2=[];CAPE=[];

let lastHY=4,lastT=1.5,last10=3,last2=2.5;

dates.forEach(d=>{
  if(hy[d]) lastHY=hy[d];
  if(tips[d]) lastT=tips[d];
  if(y10[d]) last10=y10[d];
  if(y2[d]) last2=y2[d];

  if(sp[d] && vix[d]){
    SP.push(sp[d]);
    HY.push(lastHY);
    VIX.push(vix[d]);
    TIPS.push(lastT);
    Y10.push(last10);
    Y2.push(last2);
    CAPE.push(30);
  }
});

alert("完成！資料筆數："+SP.length);
}

// ===== RSI =====
function rsi(i){
  if(i<14) return 50;
  let g=0,l=0;
  for(let j=i-14;j<i;j++){
    let d=SP[j+1]-SP[j];
    if(d>0) g+=d; else l-=d;
  }
  let rs=g/(l||1);
  return 100-100/(1+rs);
}

// ===== lerp =====
function lerp(x,x0,x1,y0,y1){
  let t=Math.max(0,Math.min(1,(x-x0)/(x1-x0)));
  return y0+t*(y1-y0);
}

// ===== Regime =====
function regime(i,use){
  if(!use) return "N";
  let R=rsi(i);
  let slope=Y10[i]-Y2[i];
  let v=VIX[i];
  if(R>60 && slope>0 && v<20) return "ON";
  if(R<40 && slope<0 && v>25) return "OFF";
  return "MID";
}

// ===== V8 =====
function decide(i,shield,useV8,reg){

  if(!useV8){
    if(shield>60) return 1.5;
    if(shield>40) return 1;
    return 0;
  }

  let max=1;
  if(reg==="ON") max=1.5;
  if(reg==="OFF") max=0.5;

  if(reg==="OFF" && shield<50) return 0;

  if(reg!=="ON" && rsi(i)<35 && VIX[i]>30)
    return 0.3;

  if(shield>60) return max;
  if(shield>40) return 1;

  return 0;
}

// ===== 回測 =====
function run(){

let useReg=document.getElementById("useRegime").checked;
let useV8=document.getElementById("useV8").checked;
let useYC=document.getElementById("useYC").checked;

let eq=100;
let curve=[];

for(let i=20;i<SP.length;i++){

  let ret=(SP[i]-SP[i-1])/SP[i-1];

  let f1=lerp((100/CAPE[i])-TIPS[i],0,4,10,100);
  let f5=lerp(HY[i]*100,250,600,80,20);

  let yc = useYC ? lerp(Y10[i]-Y2[i],-1,2,20,100) : 50;

  let shield = f1*0.5 + f5*0.3 + yc*0.2;

  let reg = regime(i,useReg);

  let pos = decide(i,shield,useV8,reg);

  eq *= (1 + pos*ret);
  curve.push(eq);
}

// ===== 畫圖 =====
new Chart(document.getElementById("chart"),{
  type:"line",
  data:{
    labels:curve.map((_,i)=>i),
    datasets:[{label:"Equity",data:curve}]
  }
});

}

</script>
</body>
</html>
:::
