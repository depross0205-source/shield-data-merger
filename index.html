<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>動能交易日誌 v1.2</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0a0c10;--sf:#12161f;--sf2:#1a2030;--bd:#252d3d;--bhi:#3a4560;
  --tx:#e2eaf8;--mu:#6b7a99;--gr:#00e5a0;--re:#ff4d6d;--red:#3d0012;
  --ye:#ffb830;--bl:#4d9fff;--bld:#001a3d;--ac:#7eb8ff;
  --tw:#ff6b9d;--twd:#3d0020;--te:#00d4aa;--ted:#003328;--wh:#f8faff;
  --us:#a78bfa;--usd:#1a0040;
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;padding:16px;font-size:14px;line-height:1.6}
.mono{font-family:'Courier New',monospace}
.wrap{max-width:960px;margin:0 auto}
h1{font-size:18px;font-weight:700;color:var(--wh);margin-bottom:4px;display:flex;align-items:center;gap:8px}
.tag{font-size:11px;padding:2px 8px;border-radius:3px;background:var(--tw);color:#000;font-weight:700}
.sub{font-size:11px;color:var(--mu);margin-bottom:14px}
.card{background:var(--sf);border:1px solid var(--bd);padding:13px;margin-bottom:10px;border-radius:3px}
.ct{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--mu);margin-bottom:9px;display:flex;justify-content:space-between;align-items:center}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.fi{display:flex;flex-direction:column;gap:3px}
.fi label{font-size:10px;color:var(--mu);font-weight:700;text-transform:uppercase}
input[type=number],select{background:var(--bg);border:1px solid var(--bhi);color:var(--wh);padding:7px 9px;border-radius:3px;font-size:13px;font-family:'Courier New',monospace;width:100%}
input:focus,select:focus{outline:none;border-color:var(--tw)}
button{padding:9px 14px;border:none;border-radius:3px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;transition:.15s}
.btw{background:var(--tw);color:#000;width:100%}.btw:hover{opacity:.85}
.bo{background:transparent;border:1px solid var(--bhi);color:var(--mu)}.bo:hover{color:var(--tx);border-color:var(--tx)}
.sm{padding:5px 11px;font-size:11px;width:auto}
.log{font-size:11px;color:var(--mu);font-family:'Courier New',monospace;margin-top:7px;min-height:16px;word-break:break-all}
.hidden{display:none}
.tw-wrap{overflow-x:auto;max-height:540px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:7px 8px;color:var(--mu);text-align:left;background:var(--sf2);position:sticky;top:0;z-index:2;font-size:10px;white-space:nowrap}
td{padding:6px 8px;border-bottom:1px solid var(--bd);white-space:nowrap;vertical-align:middle}
tr:hover{background:var(--sf2)}
.tg{color:var(--gr)}.tr{color:var(--re)}.wh{color:var(--wh)}
.alert-buy{background:var(--ted);border-left:3px solid var(--te);padding:10px 12px;margin-bottom:6px;border-radius:3px;display:flex;align-items:center;flex-wrap:wrap;gap:8px}
.alert-sell{background:var(--red);border-left:3px solid var(--re);padding:10px 12px;margin-bottom:6px;border-radius:3px;display:flex;align-items:center;flex-wrap:wrap;gap:8px}
.chip{display:inline-flex;align-items:center;padding:3px 8px;border-radius:3px;font-size:11px;font-family:'Courier New',monospace;border:1px solid var(--bd);background:var(--bg);margin:2px;cursor:pointer;gap:4px;transition:.12s}
.chip.on{background:var(--twd);border-color:var(--tw);color:var(--tw)}
.chip.on.us{background:var(--usd);border-color:var(--us);color:var(--us)}
.chip.on.etf{background:var(--bld);border-color:var(--bl);color:var(--bl)}
.cnm{font-size:9px;opacity:.6;font-family:system-ui,sans-serif}
.stats-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.stat-box{background:var(--sf2);border:1px solid var(--bd);padding:8px 14px;border-radius:3px;min-width:90px}
.stat-label{font-size:9px;color:var(--mu);font-weight:700;text-transform:uppercase;margin-bottom:2px}
.stat-val{font-size:18px;font-weight:700;font-family:'Courier New',monospace}
.pool-hdr{font-size:10px;font-weight:700;margin:8px 0 4px;text-transform:uppercase}
.sep{border:none;border-top:1px solid var(--bd);margin:10px 0}
.load-bar{background:var(--bd);border-radius:2px;height:3px;margin-top:6px;overflow:hidden;display:none}
.load-fill{height:100%;background:var(--tw);border-radius:2px;transition:width .2s}
.code-cell{font-family:'Courier New',monospace;font-weight:700;line-height:1.3}
.code-nm{font-size:10px;color:var(--mu);font-weight:400;font-family:system-ui,sans-serif;display:block}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:999;display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.modal-box{background:var(--sf);border:2px solid var(--re);border-radius:6px;max-width:500px;width:100%;padding:16px}
.grp-btn{padding:1px 6px;font-size:10px;border-radius:3px;border:1px solid var(--bhi);background:transparent;color:var(--mu);cursor:pointer;margin-left:3px}
.grp-btn:hover{color:var(--tx);border-color:var(--tx)}
</style>
</head>
<body>
<div class="wrap">
<h1>動能交易日誌 <span class="tag">v1.2</span></h1>
<div class="sub">從 V1.8 JSON 載入 → 偵測入選/出場 → 交易日誌</div>

<div class="card">
  <div class="ct">1. 載入 V1.8 JSON
    <button class="bo sm" onclick="document.getElementById('fj').click()">UPLOAD</button>
  </div>
  <input type="file" id="fj" accept=".json" style="display:none" onchange="upJson(this)">
  <div id="loadStat" style="font-size:11px;color:var(--mu)">未載入</div>
  <div class="load-bar" id="loadBar"><div class="load-fill" id="loadFill" style="width:0%"></div></div>
  <div id="stockPool" style="margin-top:10px"></div>
</div>

<div class="card">
  <div class="ct">2. 參數設定</div>
  <div class="g3">
    <div class="fi">
      <label>Signal Lag</label>
      <select id="pLag">
        <option value="1">T-1</option>
        <option value="2" selected>T-2</option>
      </select>
    </div>
    <div class="fi">
      <label>Pool Mode</label>
      <select id="pPoolMode" onchange="toggleQuotaUI()">
        <option value="large">Large (全局)</option>
        <option value="small" selected>Small (分區)</option>
      </select>
    </div>
    <div class="fi">
      <label>TNX Spread %</label>
      <input type="number" id="pSpread" value="0.5" step="0.1" min="0">
    </div>
    <div class="fi">
      <label>Corr Threshold</label>
      <input type="number" id="pCorrT" value="0.75" step="0.05" min="0.3" max="1">
    </div>
    <div class="fi" id="qtwWrap">
      <label>台股配額</label>
      <input type="number" id="pQtw" value="2" min="0">
    </div>
    <div class="fi" id="qusWrap">
      <label>美股配額</label>
      <input type="number" id="pQus" value="2" min="0">
    </div>
    <div class="fi" id="qetfWrap">
      <label>ETF 配額</label>
      <input type="number" id="pQetf" value="1" min="0">
    </div>
    <div class="fi" id="largeNWrap" style="display:none">
      <label>Total N</label>
      <input type="number" id="pN" value="5" min="1">
    </div>
    <div class="fi">
      <label>初始本金</label>
      <input type="number" id="initCap" value="10000" min="100" step="1000">
    </div>
    <div class="fi" style="grid-column:1/-1">
      <label style="font-size:11px;display:flex;align-items:center;gap:8px;cursor:pointer">
        <input type="checkbox" id="slOn" style="width:14px;accent-color:var(--re)">
        停損 Stop-Loss
        <input type="number" id="slPct" value="10" min="1" max="50" style="width:70px">
        %
      </label>
    </div>
  </div>
</div>

<div style="display:flex;gap:8px;margin-bottom:6px">
  <button class="btw" onclick="runAnalysis()" style="flex:1">EXECUTE</button>
  <button id="freqBtn" class="bo" onclick="toggleFreqMode()" style="min-width:64px;white-space:nowrap;font-size:12px">月頻</button>
</div>
<div class="log" id="runLog"></div>

<div class="card hidden" id="alertCard">
  <div class="ct">
    <span>LATEST SIGNALS</span>
    <span id="alertDate" style="color:var(--tw);font-family:'Courier New',monospace;font-size:11px"></span>
  </div>
  <div id="alertContent"></div>
  <hr class="sep">
  <div style="font-size:10px;color:var(--mu)">最新一期比較，T 天收盤價為基準</div>
</div>

<div class="card hidden" id="holdCard">
  <div class="ct">CURRENT HOLDINGS
    <span id="holdDate" style="color:var(--mu);font-size:10px"></span>
  </div>
  <div class="tw-wrap">
    <table><thead><tr>
      <th>代碼 / 名稱</th><th>入場日</th>
      <th>入場 @</th><th>目前 @</th>
      <th>天數</th><th>浮盈%</th>
    </tr></thead>
    <tbody id="holdBody"></tbody></table>
  </div>
</div>

<div class="card hidden" id="trackCard">
  <div class="ct">TRADE HISTORY
    <span id="trackCount" style="color:var(--mu);font-size:10px"></span>
  </div>
  <div id="trackSummary"></div>
  <div class="tw-wrap">
    <table><thead><tr>
      <th>代碼 / 名稱</th><th>入場日</th>
      <th>入場 @</th><th>出場日</th>
      <th>出場 @</th><th>天數</th>
      <th>報酬%</th><th>結果</th>
    </tr></thead>
    <tbody id="trackBody"></tbody></table>
  </div>
</div>
</div>

<div id="outlierModal" class="modal-overlay" onclick="closeOutlier()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div style="font-size:13px;font-weight:700;color:var(--re);margin-bottom:10px">
      OUTLIER REVIEW
    </div>
    <div style="font-size:11px;color:var(--mu);margin-bottom:10px">
      報酬超過 2 Sigma，建議對照檢查
    </div>
    <div id="outlierContent"></div>
    <button onclick="closeOutlier()" style="margin-top:12px;width:100%;padding:9px;background:var(--tw);color:#000;font-weight:700;border:none;border-radius:3px;cursor:pointer">
      CONFIRM
    </button>
  </div>
</div>

var FREQ_MODE = 'monthly';
var LAST_OUTLIERS = [];
var DAILY = {};
var ALL_SIGNALS = [];
var TRACK_RECORDS = [];
var CURRENT_HOLDINGS = [];
var DETECTED_STOCKS = [];

var ETF_CODES = [
  'SPY','QQQ','IWM','VEU','EFA','EEM','TLT','IEF','GLD','SLV','VNQ','AGG',
  'IWF','IWD','IJH','IJR','SGOV','ITOT','EWT','MCHI','EWY','EWJ','EZU','IVV',
  'BIL','SHV','CSSPX','ACWI','IEMG','IAU','PDBC'
];

function $(i){ return document.getElementById(i); }
function sl(id,msg,ok){
  var e=$(id); if(!e)return;
  e.textContent=msg;
  e.style.color=ok===true?'var(--gr)':ok===false?'var(--re)':'var(--mu)';
}

function getStockName(code){ return STOCK_NAMES[code]||''; }

function classifyStock(code){
  if(code.charAt(0)==='^')return 'bench';
  if(ETF_CODES.indexOf(code)!==-1)return 'etf';
  if(/^\d{4}$/.test(code))return 'tw';
  if(/^\d{4}.\w/.test(code))return 'tw';
  return 'us';
}

function colForPool(code){
  var p=classifyStock(code);
  return p==='tw'?'var(--tw)':p==='etf'?'var(--bl)':'var(--us)';
}

function toggleFreqMode(){
  FREQ_MODE=FREQ_MODE==='monthly'?'daily':'monthly';
  var btn=$('freqBtn'); if(!btn)return;
  var isD=FREQ_MODE==='daily';
  btn.textContent=isD?'\u65e5\u983b':'\u6708\u983b';
  btn.style.color=isD?'var(--ye)':'var(--mu)';
  btn.style.borderColor=isD?'var(--ye)':'var(--bhi)';
}

function toggleQuotaUI(){
  var mode=$('pPoolMode').value,isL=mode==='large';
  $('largeNWrap').style.display=isL?'':'none';
  ['qtwWrap','qusWrap','qetfWrap'].forEach(function(id){
    var w=$(id); w.style.opacity=isL?'0.4':'1';
    var inp=w.querySelector('input'); if(inp)inp.disabled=isL;
  });
}

function readParams(){
  var mode=$('pPoolMode').value;
  var qTW=parseInt($('pQtw').value)||2;
  var qUS=parseInt($('pQus').value)||2;
  var qETF=parseInt($('pQetf').value)||1;
  return{
    lag:parseInt($('pLag').value)||2,
    spread:parseFloat($('pSpread').value)||0.5,

    n:mode==='large'?(parseInt($('pN').value)||5):(qTW+qUS+qETF)
  };
}

function getPriceOnDate(bars,dateStr){
  if(!bars||!bars.length)return null;
  var best=null;
  for(var i=0;i<bars.length;i++){
    if(bars[i].date<=dateStr)best=bars[i].c;
    else break;
  }
  return best;
}

function getPrevWorkDayFromRef(refDaily,dateStr,offset){
  if(!refDaily||!refDaily.length)return dateStr;
  var idx=-1;
  for(var i=0;i<refDaily.length;i++){
    if(refDaily[i].date<=dateStr)idx=i;
    else break;
  }
  if(idx<0)return refDaily[0].date;
  return refDaily[Math.max(0,idx-offset)].date;
}

function getRebalDates(refDaily){
  if(!refDaily||!refDaily.length)return[];
  var dates=[],curYM='',lastDate='';
  refDaily.forEach(function(b){
    var ym=b.date.slice(0,7);
    if(ym!==curYM){if(curYM&&lastDate)dates.push(lastDate);curYM=ym;}
    lastDate=b.date;
  });
  if(curYM&&lastDate)dates.push(lastDate);
  return dates;
}

function getAllTradingDates(refDaily){
  return refDaily.map(function(b){return b.date;});
}

function momZ(bars,idx,period){
  if(idx<period)return null;
  var ret=bars[idx].c/bars[idx-period].c-1;
  var rets=[],start=Math.max(period,idx-250);
  for(var i=start;i<=idx;i++)rets.push(bars[i].c/bars[i-period].c-1);
  var mean=rets.reduce(function(a,b){return a+b;},0)/rets.length;
  var std=Math.sqrt(rets.reduce(function(a,b){return a+Math.pow(b-mean,2);},0)/rets.length)||0.01;
  return(ret-mean)/std;
}

function rawMom(bars,idx,isDaily){
  var pL=isDaily?60:240,pM=isDaily?20:120,pS=isDaily?10:60;
  if(idx<pL)return null;
  var zL=momZ(bars,idx,pL),zM=momZ(bars,idx,pM),zS=momZ(bars,idx,pS);
  if(zL===null||zM===null||zS===null)return null;
  var score=0.5*zL+0.3*zM+0.2*zS;
  if(zL>0&&zM>0&&zS>0)score*=1.2;
  return score;
}

function calcBias(cut,n){
  if(!cut||cut.length<n)return null;
  var sl=cut.slice(-n),sp=0,sv=0;
  sl.forEach(function(b){var v=(b.v&&b.v>0)?b.v:1;sp+=b.c*v;sv+=v;});
  var vwma=sv>0?sp/sv:null;
  return vwma?(cut[cut.length-1].c-vwma)/vwma:null;
}

function calcSlope(cut,n){
  if(!cut||cut.length<n+3)return null;
  var va=[];
  for(var i=cut.length-n;i<cut.length;i++){
    var sl2=cut.slice(Math.max(0,i-n+1),i+1),sp=0,sv=0;
    sl2.forEach(function(b){var v=(b.v&&b.v>0)?b.v:1;sp+=b.c*v;sv+=v;});
    if(sv>0)va.push(sp/sv);
  }
  if(va.length<Math.floor(n/2))return null;
  var ln=va.length,sx=0,sy=0,sxy=0,sx2=0;
  for(var j=0;j<ln;j++){sx+=j;sy+=va[j];sxy+=j*va[j];sx2+=j*j;}
  var den=ln*sx2-sx*sx;
  return den?(ln*sxy-sx*sy)/den/(va[0]||1):0;
}

function calcVolMom(cut,n){
  if(!cut||cut.length<n+1)return null;
  var sl=cut.slice(-n),sc=[];
  for(var i=1;i<sl.length;i++){
    var pr=(sl[i].c-sl[i-1].c)/(sl[i-1].c||1);
    var vr=sl[i-1].v>0?sl[i].v/sl[i-1].v:1;
    sc.push((pr>=0?1:-1)*(pr>=0?(vr-1):(1-vr)));
  }
  return sc.length?sc.reduce(function(a,b){return a+b;},0)/sc.length:null;
}

function calcKbar(cut,n){
  if(!cut||cut.length<n)return null;
  var sl=cut.slice(-n);
  var v=sl.map(function(b){var r=b.h-b.l;return r>0?(b.c-b.l)/r:0.5;});
  return v.reduce(function(a,b){return a+b;},0)/v.length;
}

function crossZ(arr,cap){
  cap=cap||2;
  var vals=arr.filter(function(v){return v!==null&&!isNaN(v);});
  if(vals.length<3)return arr.map(function(v){return v===null?null:0;});
  var mean=vals.reduce(function(a,b){return a+b;},0)/vals.length;
  var std=Math.sqrt(vals.reduce(function(a,b){return a+(b-mean)*(b-mean);},0)/vals.length)||1;
  return arr.map(function(v){
    if(v===null||isNaN(v))return null;
    return Math.max(-cap,Math.min(cap,(v-mean)/std));
  });
}

function calcCorr(c1,c2,dateStr){
  var b1=DAILY[c1],b2=DAILY[c2]; if(!b1||!b2)return 0;
  var WIN=24,i1=-1,i2=-1;
  for(var i=0;i<b1.length;i++){if(b1[i].date<=dateStr)i1=i;else break;}
  for(var i=0;i<b2.length;i++){if(b2[i].date<=dateStr)i2=i;else break;}
  if(i1<WIN*20||i2<WIN*20)return 0;
  var r1=[],r2=[];
  for(var k=0;k<WIN;k++){
    r1.push(b1[i1-k*20].c/b1[i1-(k+1)*20].c-1);
    r2.push(b2[i2-k*20].c/b2[i2-(k+1)*20].c-1);
  }
  var m1=r1.reduce(function(a,b){return a+b;},0)/r1.length;
  var m2=r2.reduce(function(a,b){return a+b;},0)/r2.length;
  var num=0,d1=0,d2=0;
  r1.forEach(function(v,i){num+=(v-m1)*(r2[i]-m2);d1+=(v-m1)*(v-m1);d2+=(r2[i]-m2)*(r2[i]-m2);});
  return num/Math.sqrt((d1*d2)||1);
}

function getHurdle(dateStr,spread){
  var tnx=(DAILY['^TNX']&&getPriceOnDate(DAILY['^TNX'],dateStr))?
  getPriceOnDate(DAILY['^TNX'],dateStr)/100:0.04;
  return Math.max(0,tnx+(spread||0.5)/100);
}

function calcScoresForDate(scoreDate,stocks,isDaily){
  var minBars=isDaily?70:250,minIdx=isDaily?60:240;
  var rMs=[],rBs=[],rSs=[],rVs=[],rKs=[],infos=[];
  stocks.forEach(function(s){
    var bars=DAILY[s.c];
    if(!bars||bars.length<minBars){
      [rMs,rBs,rSs,rVs,rKs].forEach(function(a){a.push(null);});
      infos.push({s:s,r240:null});return;
    }
    var idx=-1;
    for(var i=0;i<bars.length;i++){if(bars[i].date<=scoreDate)idx=i;else break;}
    if(idx<minIdx){
      [rMs,rBs,rSs,rVs,rKs].forEach(function(a){a.push(null);});
      infos.push({s:s,r240:null});return;
    }
    var cut=bars.slice(0,idx+1);
    var winB=isDaily?20:60,winSV=isDaily?20:60,winK=isDaily?20:60;
    rMs.push(rawMom(bars,idx,isDaily));
    rBs.push(calcBias(cut,winB));
    rSs.push(calcSlope(cut,winB));
    rVs.push(calcVolMom(cut,winSV));
    rKs.push(calcKbar(cut,winK));
    var rPeriod=isDaily?60:240;
    infos.push({s:s,r240:bars[idx].c/(bars[Math.max(0,idx-rPeriod)].c||1)-1});
  });
  var zMs=crossZ(rMs,99),zBs=crossZ(rBs,2),zSs=crossZ(rSs,99),zVs=crossZ(rVs,2),zKs=crossZ(rKs,99);
  var w={m:0.5,b:0.15,s:0.15,v:0.10,k:0.10};
  var results=[];
  infos.forEach(function(d,i){
    if(d.r240===null||zMs[i]===null)return;
    var sc=w.m*(zMs[i]||0)+w.b*(zBs[i]||0)+w.s*(zSs[i]||0)+w.v*(zVs[i]||0)+w.k*(zKs[i]||0);
    results.push({s:d.s,score:sc,r240:d.r240});
  });
  return results;
}

function selectPortfolio(scores,scoreDate,params,prevCodes){
  var hurdle=getHurdle(scoreDate,params.spread);
  var DEF=['TLT','GLD','SGOV'],ct=params.corrT;
  var N=params.n;
  prevCodes=prevCodes||[];

  // Defensive pool: qualify independently of hurdle for SGOV, slightly above for others
  function defQual(r){
    if(r.s.c==='SGOV')return r.r240>0;
    return r.r240>hurdle+0.01;
  }

  // Full-defensive fallback: hurdle fails entirely
  var anyAbove=scores.some(function(r){return DEF.indexOf(r.s.c)===-1&&r.r240>hurdle&&r.score>0;});
  if(!anyAbove){
    var defFall=scores.filter(defQual).sort(function(a,b){return b.r240-a.r240;});
    var fallArr=defFall.slice(0,N).map(function(r){return r.s.c;});
    if(!fallArr.length)fallArr=['SGOV'];
    // Pad with SGOV if needed
    while(fallArr.length<N)fallArr.push('SGOV');
    return fallArr;
  }

  // Build ranked candidate list (non-defensive only)
  var cands=scores.filter(function(r){
    return DEF.indexOf(r.s.c)===-1&&r.r240>hurdle&&r.score>0;
  }).sort(function(a,b){return b.score-a.score;});

  // Select up to N with corr filter, respecting pool quotas
  var sel=[];
  function corrOk(code){
    return sel.every(function(x){return Math.abs(calcCorr(code,x,scoreDate))<ct;});
  }

  if(params.poolMode==='large'){
    for(var i=0;i<cands.length&&sel.length<N;i++){
      if(corrOk(cands[i].s.c))sel.push(cands[i].s.c);
    }
  }else{
    var pools={tw:[],us:[],etf:[]},quotas={tw:params.qTW,us:params.qUS,etf:params.qETF};
    cands.forEach(function(r){if(pools[r.s.pool])pools[r.s.pool].push(r);});
    ['us','tw','etf'].forEach(function(p){
      var picked=0,list=pools[p]||[];
      for(var i=0;i<list.length&&picked<quotas[p];i++){
        if(corrOk(list[i].s.c)){sel.push(list[i].s.c);picked++;}
      }
    });
  }

  // Fill remaining slots with defensive assets
  var slots=N-sel.length;
  if(slots>0){
    var def=scores.filter(function(r){
      return DEF.indexOf(r.s.c)!==-1&&defQual(r)&&sel.indexOf(r.s.c)===-1;
    }).sort(function(a,b){return b.r240-a.r240;});
    for(var j=0;j<def.length&&slots>0;j++){sel.push(def[j].s.c);slots--;}
    while(slots>0){sel.push('SGOV');slots--;}
  }

  // ---- Fixed-N one-in-one-out ----
  // If prevCodes has exactly N, only replace slots where current member
  // dropped out of qualification. Keep as many incumbents as possible.
  if(prevCodes.length===N){
    // Which incumbents still qualify (still in sel)?
    var keep=prevCodes.filter(function(c){return sel.indexOf(c)!==-1;});
    // Which new candidates are not in prevCodes?
    var incoming=sel.filter(function(c){return prevCodes.indexOf(c)===-1;});
    // How many slots freed up?
    var freed=N-keep.length;
    // Fill freed slots with top incoming candidates
    var final=keep.concat(incoming.slice(0,freed));
    // If still short (e.g. not enough incoming), pad with defensive
    if(final.length<N){
      var defExtra=scores.filter(function(r){
        return defQual(r)&&final.indexOf(r.s.c)===-1;
      }).sort(function(a,b){return b.r240-a.r240;});
      var di=0;
      while(final.length<N){
        final.push(di<defExtra.length?defExtra[di++].s.c:'SGOV');
      }
    }
    return final;
  }

  return sel;
}

function scanStopLoss(code,openPos,toDate,pct){
  var bars=DAILY[code]; if(!bars)return null;
  var entry=openPos.entryDate,stopP=openPos.entryPrice*(1-pct);
  for(var i=0;i<bars.length;i++){
    if(bars[i].date<=entry)continue;
    if(bars[i].date>toDate)break;
    if(bars[i].c<=stopP){
      var days=Math.floor((new Date(bars[i].date)-new Date(entry))/86400000);
      return{exitDate:bars[i].date,exitPrice:bars[i].c,holdDays:days,
      ret:bars[i].c/openPos.entryPrice-1,sl:true};
    }
  }
  return null;
}

function detectEvents(){
  TRACK_RECORDS=[];CURRENT_HOLDINGS=[];
  var open={};
  var slOn=$('slOn')&&$('slOn').checked;
  var slPct=slOn?(parseFloat($('slPct')?$('slPct').value:'10')||10)/100:null;
  for(var i=0;i<ALL_SIGNALS.length;i++){
    var sig=ALL_SIGNALS[i],prev=i>0?ALL_SIGNALS[i-1]:{codes:[]};
    if(slPct){
      Object.keys(open).forEach(function(code){
        var hit=scanStopLoss(code,open[code],sig.date,slPct);
        if(hit){
          TRACK_RECORDS.push({code:code,entryDate:open[code].entryDate,
          entryPrice:open[code].entryPrice,exitDate:hit.exitDate,
          exitPrice:hit.exitPrice,holdDays:hit.holdDays,ret:hit.ret,sl:true});
          delete open[code];
        }
      });
    }
    sig.codes.forEach(function(code){
      if(prev.codes.indexOf(code)===-1&&!open[code]){
        var ep=getPriceOnDate(DAILY[code],sig.date);
        if(ep)open[code]={entryDate:sig.date,entryPrice:ep};
      }
    });
    prev.codes.forEach(function(code){
      if(sig.codes.indexOf(code)===-1&&open[code]){
        var xp=getPriceOnDate(DAILY[code],sig.date);
        var days=Math.floor((new Date(sig.date)-new Date(open[code].entryDate))/86400000);
        TRACK_RECORDS.push({code:code,entryDate:open[code].entryDate,
        entryPrice:open[code].entryPrice,exitDate:sig.date,
        exitPrice:xp,holdDays:days,ret:xp?xp/open[code].entryPrice-1:null});
        delete open[code];
      }
    });
  }
  var lastSig=ALL_SIGNALS[ALL_SIGNALS.length-1];
  if(lastSig){
    lastSig.codes.forEach(function(code){
      if(open[code]){
        var cp=getPriceOnDate(DAILY[code],lastSig.date);
        var days=Math.floor((new Date(lastSig.date)-new Date(open[code].entryDate))/86400000);
        CURRENT_HOLDINGS.push({code:code,entryDate:open[code].entryDate,
        entryPrice:open[code].entryPrice,currentPrice:cp,holdDays:days,
        ret:cp?cp/open[code].entryPrice-1:null});
      }
    });
  }
}
function getStopLossReturn(code, entryDate, exitDate, stopPct){
  var bars = DAILY[code];
  if(!bars) return null;

  var entryPrice = getPriceOnDate(bars, entryDate);
  if(!entryPrice) return null;

  var stopPrice = entryPrice * (1 - stopPct);

  for(var i=0;i<bars.length;i++){
    var d = bars[i].date;
    if(d <= entryDate) continue;
    if(d > exitDate) break;

    if(bars[i].c <= stopPrice){
      return bars[i].c / entryPrice - 1;
    }
  }

  var exitPrice = getPriceOnDate(bars, exitDate);
  return exitPrice ? (exitPrice / entryPrice - 1) : null;
}
function computePortfolioStats(){
  if(ALL_SIGNALS.length<2)return null;
  var initCap=parseFloat($('initCap')?$('initCap').value:'10000')||10000;
  var slOn=$('slOn')&&$('slOn').checked;
  var slPct=slOn?(parseFloat($('slPct')?$('slPct').value:'10')||10)/100:null;

  // Build a reference trading date array from DAILY
  var refKey=DAILY['^TWII']?'^TWII':(DAILY['SPY']?'SPY':null);
  if(!refKey)return null;
  var refBars=DAILY[refKey];
  var startDate=ALL_SIGNALS[0].date;
  var endDate=ALL_SIGNALS[ALL_SIGNALS.length-1].date;

  // Build signal lookup: date -> codes[]
  var sigMap={};
  ALL_SIGNALS.forEach(function(s){sigMap[s.date]=s.codes;});

  // Walk every trading day between first and last signal
  var nav=initCap,peak=initCap,mdd=0;
  var dailyRets=[];
  var currentCodes=ALL_SIGNALS[0].codes;
  // Track entry prices for stop-loss: code -> entryPrice
  var entryPx={};
  currentCodes.forEach(function(c){
    var p=getPriceOnDate(DAILY[c],startDate);
    if(p)entryPx[c]=p;
  });

  for(var i=0;i<refBars.length;i++){
    var today=refBars[i].date;
    if(today<startDate)continue;
    if(today>endDate)break;

    // Check if today is a rebalance signal date (not the first)
    if(sigMap[today]&&today!==startDate){
      // Close out exiting positions at today's open (approximated by close)
      var newCodes=sigMap[today];
      // Update entryPx for new entries
      newCodes.forEach(function(c){
        if(currentCodes.indexOf(c)===-1){
          var p=getPriceOnDate(DAILY[c],today);
          if(p)entryPx[c]=p;
        }
      });
      // Remove entry tracking for exited positions
      currentCodes.forEach(function(c){
        if(newCodes.indexOf(c)===-1)delete entryPx[c];
      });
      currentCodes=newCodes;
    }

    // Compute today's EW portfolio return vs yesterday
    if(i===0)continue; // no prev bar
    var prevDate=refBars[i-1].date;
    if(prevDate<startDate)continue;

    var portRet=0,nValid=0;
    currentCodes.forEach(function(c){
      var bars=DAILY[c]; if(!bars)return;
      var pPrev=getPriceOnDate(bars,prevDate);
      var pToday=getPriceOnDate(bars,today);
      if(!pPrev||!pToday||pPrev<=0)return;

      var r=pToday/pPrev-1;

      // Stop-loss: if today's price breached entry*(1-slPct), clip to stop
      if(slPct&&entryPx[c]){
        var stopP=entryPx[c]*(1-slPct);
        if(pToday<=stopP){
          r=stopP/pPrev-1; // approximation: exit at stop price
          // Note: position will be replaced at next rebal; entry px stays for now
        }
      }

      portRet+=r;
      nValid++;
    });
    if(nValid>0)portRet/=nValid;

    dailyRets.push(portRet);
    nav*=(1+portRet);
    if(nav>peak)peak=nav;
    var dd=(nav-peak)/peak;
    if(dd<mdd)mdd=dd;
  }

  var d0=new Date(startDate),d1=new Date(endDate);
  var yrs=(d1-d0)/(365.25*86400000);
  if(yrs<=0||!dailyRets.length)return null;

  var cagr=Math.pow(nav/initCap,1/yrs)-1;
  var mean=dailyRets.reduce(function(a,b){return a+b;},0)/dailyRets.length;
  var variance=dailyRets.reduce(function(a,b){return a+Math.pow(b-mean,2);},0)/dailyRets.length;
  var std=Math.sqrt(variance)*Math.sqrt(252);
  var sharpe=std>0?(cagr-0.015)/std:0;
  var calmar=mdd<0?cagr/Math.abs(mdd):0;

  return{cagr:cagr,mdd:mdd,sharpe:sharpe,calmar:calmar,
    months:dailyRets.length,yrs:yrs,terminal:nav,initCap:initCap};
}

function runAnalysis(){
  if(!Object.keys(DAILY).length){alert('Upload JSON first');return;}
  var stocks=getActiveStocks();
  if(stocks.length<5){alert('Need 5+ active stocks');return;}
  var params=readParams();
  var refKey=DAILY['^TWII']?'^TWII':(DAILY['SPY']?'SPY':null);
  if(!refKey){sl('runLog','Missing benchmark',false);return;}
  var refDaily=DAILY[refKey];
  var isDaily=FREQ_MODE==='daily';
  var allM=isDaily?getAllTradingDates(refDaily):getRebalDates(refDaily);
  if(allM.length<3){sl('runLog','Not enough periods',false);return;}
  sl('runLog','Analyzing '+allM.length+' periods ('+FREQ_MODE+')...',null);
  ALL_SIGNALS=[];
  setTimeout(function(){
    try{
      var prevCodes=[];
      for(var idx=1;idx<allM.length;idx++){
        var sigM=allM[idx],prevM=allM[idx-1];
        var scoreDate=getPrevWorkDayFromRef(refDaily,prevM,params.lag);
        var scores=calcScoresForDate(scoreDate,stocks,isDaily);
        var portfolio=selectPortfolio(scores,scoreDate,params,prevCodes);
        ALL_SIGNALS.push({date:sigM,scoreDate:scoreDate,codes:portfolio});
        prevCodes=portfolio;
      }
      detectEvents();
      renderAlerts();
      renderHoldings();
      renderTrackRecord();
      sl('runLog','['+FREQ_MODE+'] Done: '+ALL_SIGNALS.length+' periods',true);
    }catch(e){sl('runLog',e.message,false);console.error(e);}
  },50);
}

function renderAlerts(){
  var n=ALL_SIGNALS.length; if(n<1)return;
  var lastSig=ALL_SIGNALS[n-1],prevSig=n>1?ALL_SIGNALS[n-2]:{codes:[]};
  var entries=lastSig.codes.filter(function(c){return prevSig.codes.indexOf(c)===-1;});
  var exits=prevSig.codes.filter(function(c){return lastSig.codes.indexOf(c)===-1;});
  $('alertCard').classList.remove('hidden');
  $('alertDate').textContent=lastSig.date;
  var html='';
  if(!entries.length&&!exits.length)
    html='<div style="color:var(--mu);font-size:12px">No changes.</div>';
  entries.forEach(function(c){
    var col=colForPool(c),nm=getStockName(c);
    var ep=getPriceOnDate(DAILY[c],lastSig.date);
    html+='<div class="alert-buy">'
    +'<span style="color:var(--te);font-weight:700">BUY</span>'
    +'<span class="mono" style="font-weight:700;color:'+col+'">'+c+'</span>'
    +(nm?'<span style="color:var(--mu);font-size:11px">'+nm+'</span>':'')
    +'<span class="mono" style="color:var(--wh)">@ '+(ep?ep.toFixed(2):'--')+'</span>'
    +'</div>';
  });
  exits.forEach(function(c){
    var col=colForPool(c),nm=getStockName(c);
    var rec=null;
    for(var ri=TRACK_RECORDS.length-1;ri>=0;ri--){
      if(TRACK_RECORDS[ri].code===c&&TRACK_RECORDS[ri].exitDate===lastSig.date){
        rec=TRACK_RECORDS[ri];break;
      }
    }
    var retStr='';
    if(rec&&rec.ret!==null){
      var rc=rec.ret>=0?'var(--gr)':'var(--re)';
      retStr='<span class="mono" style="color:'+rc+';font-weight:700">'
      +(rec.ret>=0?'+':'')+(rec.ret*100).toFixed(2)+'%</span>'
      +'<span style="color:var(--mu);font-size:10px"> '+rec.holdDays+'d</span>';
    }
    html+='<div class="alert-sell">'
    +'<span style="color:var(--re);font-weight:700">SELL</span>'
    +'<span class="mono" style="font-weight:700;color:'+col+'">'+c+'</span>'
    +(nm?'<span style="color:var(--mu);font-size:11px">'+nm+'</span>':'')
    +retStr+'</div>';
  });
  $('alertContent').innerHTML=html;
}

function renderHoldings(){
  if(!CURRENT_HOLDINGS.length)return;
  $('holdCard').classList.remove('hidden');
  var lastDate=ALL_SIGNALS.length?ALL_SIGNALS[ALL_SIGNALS.length-1].date:'';
  $('holdDate').textContent='as of '+lastDate;
  var html='';
  CURRENT_HOLDINGS.slice().sort(function(a,b){return(b.ret||0)-(a.ret||0);})
  .forEach(function(h){
    var col=colForPool(h.code),nm=getStockName(h.code);
    var rc=h.ret===null?'var(--mu)':h.ret>=0?'var(--gr)':'var(--re)';
    html+='<tr>'
    +'<td><span class="code-cell" style="color:'+col+'">'+h.code
    +'<span class="code-nm">'+nm+'</span></span></td>'
    +'<td class="mono" style="color:var(--mu)">'+h.entryDate+'</td>'
    +'<td class="mono">'+h.entryPrice.toFixed(2)+'</td>'
    +'<td class="mono">'+(h.currentPrice?h.currentPrice.toFixed(2):'--')+'</td>'
    +'<td class="mono" style="color:var(--mu)">'+h.holdDays+'</td>'
    +'<td class="mono" style="color:'+rc+';font-weight:700">'
    +(h.ret!==null?(h.ret>=0?'+':'')+(h.ret*100).toFixed(2)+'%':'--')
    +'</td></tr>';
  });
  $('holdBody').innerHTML=html;
}

function renderTrackRecord(){
  if(!TRACK_RECORDS.length){$('trackCard').classList.add('hidden');return;}
  $('trackCard').classList.remove('hidden');
  $('trackCount').textContent=TRACK_RECORDS.length+' trades';

  var ps=computePortfolioStats();
  var pHtml='';
  if(ps){
    var cc=ps.cagr>=0?'var(--gr)':'var(--re)';
    var sc=ps.sharpe>=1?'var(--gr)':ps.sharpe>=0?'var(--ye)':'var(--re)';
    var clc=ps.calmar>=1?'var(--gr)':ps.calmar>=0.5?'var(--ye)':'var(--re)';
    pHtml='<div style="font-size:10px;color:var(--mu);font-weight:700;margin-bottom:5px">'
    +'PORTFOLIO (EW '+FREQ_MODE+', '+ps.yrs.toFixed(1)+'yr)</div>'
    +'<div class="stats-row">'
    +'<div class="stat-box"><div class="stat-label">CAGR</div>'
    +'<div class="stat-val" style="color:'+cc+'">'+(ps.cagr>=0?'+':'')+(ps.cagr*100).toFixed(1)+'%</div></div>'
    +'<div class="stat-box"><div class="stat-label">Max DD</div>'
    +'<div class="stat-val tr">'+(ps.mdd*100).toFixed(1)+'%</div></div>'
    +'<div class="stat-box"><div class="stat-label">Sharpe</div>'
    +'<div class="stat-val" style="color:'+sc+'">'+ps.sharpe.toFixed(2)+'</div></div>'
    +'<div class="stat-box"><div class="stat-label">Calmar</div>'
    +'<div class="stat-val" style="color:'+clc+'">'+ps.calmar.toFixed(2)+'</div></div>'
    +'<div class="stat-box"><div class="stat-label">Terminal</div>'
    +'<div class="stat-val wh">$'+Math.round(ps.terminal).toLocaleString()+'</div></div>'
    +'<div class="stat-box"><div class="stat-label">Periods</div>'
    +'<div class="stat-val wh">'+ps.months+'</div></div>'
    +'</div>';
  }

  var valid=TRACK_RECORDS.filter(function(t){return t.ret!==null;});
  var winOnly=valid.filter(function(t){return t.ret>0.03;});
  var fvOnly=valid.filter(function(t){return t.ret>0.005&&t.ret<=0.03;});
  var flatOnly=valid.filter(function(t){return t.ret>=-0.005&&t.ret<=0.005;});
  var lossTr=valid.filter(function(t){return t.ret<-0.005;});
  var winPos=valid.filter(function(t){return t.ret>0.005;});
  var avgWin=winPos.length?winPos.reduce(function(a,t){return a+t.ret;},0)/winPos.length:0;
  var avgLoss=lossTr.length?lossTr.reduce(function(a,t){return a+t.ret;},0)/lossTr.length:0;
  var avgDays=TRACK_RECORDS.reduce(function(a,t){return a+t.holdDays;},0)/TRACK_RECORDS.length;
  var bestRet=valid.length?Math.max.apply(null,valid.map(function(t){return t.ret;})):0;
  var worstRet=valid.length?Math.min.apply(null,valid.map(function(t){return t.ret;})):0;
  var meanR=valid.length?valid.reduce(function(a,t){return a+t.ret;},0)/valid.length:0;
  var stdR=Math.sqrt(valid.reduce(function(a,t){return a+Math.pow(t.ret-meanR,2);},0)/Math.max(valid.length,1))||1;
  var outliers=valid.filter(function(t){return Math.abs(t.ret-meanR)>2*stdR;});
  LAST_OUTLIERS=outliers;

  var cur=0,maxLS=0;
  valid.slice().sort(function(a,b){return a.exitDate<b.exitDate?-1:1;})
  .forEach(function(t){
    if(t.ret<-0.005){cur++;if(cur>maxLS)maxLS=cur;}else cur=0;
  });

  var tHtml='<div style="font-size:10px;color:var(--mu);font-weight:700;margin:8px 0 5px">TRADE SUMMARY</div>'
  +'<div class="stats-row">'
  +'<div class="stat-box"><div class="stat-label">Trades</div><div class="stat-val wh">'+TRACK_RECORDS.length+'</div></div>'
  +'<div class="stat-box"><div class="stat-label">WIN</div><div class="stat-val tg">'+winOnly.length+'</div></div>'
  +'<div class="stat-box"><div class="stat-label">FV</div><div class="stat-val" style="color:var(--te)">'+fvOnly.length+'</div></div>'
  +'<div class="stat-box"><div class="stat-label">FLAT</div><div class="stat-val" style="color:var(--ye)">'+flatOnly.length+'</div></div>'
  +'<div class="stat-box"><div class="stat-label">LOSS</div><div class="stat-val tr">'+lossTr.length+'</div></div>'
  +'</div>'
  +'<div class="stats-row">'
  +'<div class="stat-box"><div class="stat-label">Avg Win</div><div class="stat-val tg">+'+(avgWin*100).toFixed(1)+'%</div></div>'
  +'<div class="stat-box"><div class="stat-label">Avg Loss</div><div class="stat-val tr">'+(avgLoss*100).toFixed(1)+'%</div></div>'
  +'<div class="stat-box"><div class="stat-label">Avg Hold</div><div class="stat-val wh">'+Math.round(avgDays)+'d</div></div>'
  +'<div class="stat-box"><div class="stat-label">Max L-Streak</div><div class="stat-val tr">'+maxLS+'</div></div>'
  +'<div class="stat-box"><div class="stat-label">Best</div><div class="stat-val tg">+'+(bestRet*100).toFixed(1)+'%</div></div>'
  +'<div class="stat-box"><div class="stat-label">Worst</div><div class="stat-val tr">'+(worstRet*100).toFixed(1)+'%</div></div>'
  +(outliers.length?'<div class="stat-box" style="border-color:var(--re);cursor:pointer" onclick="checkOutliers(LAST_OUTLIERS)">'
  +'<div class="stat-label" style="color:var(--re)">Outlier</div>'
  +'<div class="stat-val" style="color:var(--re)">'+outliers.length+'</div></div>':'')
  +'</div>';

  if(outliers.length) checkOutliers(outliers);
  $('trackSummary').innerHTML=pHtml+tHtml+renderPerStock(valid);

  var LIMIT=200;
  var recs=valid.slice().reverse().slice(0,LIMIT);
  var html=valid.length>LIMIT ? '<div style="font-size:11px;color:var(--mu);padding:5px 0 8px">Showing '+LIMIT+' of '+valid.length+'</div>' : '';
  recs.forEach(function(t){
    var col=colForPool(t.code),nm=getStockName(t.code);
    var rc=t.ret>=0?'var(--gr)':'var(--re)';
    var verdict=t.ret>0.03?'WIN':t.ret>0.005?'FV':t.ret>=-0.005?'FLAT':'LOSS';
    var vc=t.ret>0.03?'var(--gr)':t.ret>0.005?'var(--te)':t.ret>=-0.005?'var(--ye)':'var(--re)';
    html+='<tr>'
    +'<td><span class="code-cell" style="color:'+col+'">'+t.code
    +'<span class="code-nm">'+nm+'</span></span></td>'
    +'<td class="mono" style="color:var(--mu)">'+t.entryDate+'</td>'
    +'<td class="mono">'+t.entryPrice.toFixed(2)+'</td>'
    +'<td class="mono" style="color:var(--mu)">'+t.exitDate+'</td>'
    +'<td class="mono">'+t.exitPrice.toFixed(2)+'</td>'
    +'<td class="mono" style="color:var(--mu)">'+t.holdDays+'d</td>'
    +'<td class="mono" style="color:'+rc+';font-weight:700">'
    +(t.ret>=0?'+':'')+(t.ret*100).toFixed(2)+'%</td>'
    +'<td style="color:'+vc+';font-size:11px;font-weight:700">'+verdict+(t.sl?' SL':'')+'</td>'
    +'</tr>';
  });
  $('trackBody').innerHTML=html;
}

function renderPerStock(records){
  var map={};
  records.forEach(function(t){if(!map[t.code])map[t.code]=[];map[t.code].push(t);});
  var rows=Object.keys(map).map(function(code){
    var tr=map[code],wins=tr.filter(function(t){return t.ret>0.005;});
    var totalR=tr.reduce(function(a,t){return a*(1+t.ret);},1)-1;

    return{code:code,count:tr.length,wr:wins.length/tr.length,avg:totalR/tr.length,tot:totalR};
  }).sort(function(a,b){return b.avg-a.avg;});
  var h='<div style="font-size:10px;color:var(--mu);font-weight:700;margin:12px 0 5px">PER-STOCK PERFORMANCE</div>'
  +'<div class="tw-wrap" style="max-height:240px"><table><thead><tr>'
  +'<th>Code</th><th>N</th><th>Win%</th><th>AvgRet</th><th>Total</th>'
  +'</tr></thead><tbody>';
  rows.forEach(function(r){
    var col=colForPool(r.code),nm=getStockName(r.code);
    var rc=r.avg>=0?'var(--gr)':'var(--re)';
    var wc=r.wr>=0.5?'var(--gr)':'var(--re)';
    h+='<tr>'
    +'<td><span class="code-cell" style="color:'+col+'">'+r.code
    +'<span class="code-nm">'+nm+'</span></span></td>'
    +'<td class="mono">'+r.count+'</td>'
    +'<td class="mono" style="color:'+wc+'">'+(r.wr*100).toFixed(0)+'%</td>'
    +'<td class="mono" style="color:'+rc+'">'+(r.avg>=0?'+':'')+(r.avg*100).toFixed(2)+'%</td>'
    +'<td class="mono" style="color:'+rc+'">'+(r.tot>=0?'+':'')+(r.tot*100).toFixed(1)+'%</td>'
    +'</tr>';
  });
  return h+'</tbody></table></div>';
}

function checkOutliers(outliers){
  if(!outliers||!outliers.length)return;
  var h='';
  outliers.forEach(function(t){
    var col=t.ret>=0?'var(--gr)':'var(--re)';
    var nm=getStockName(t.code)||'';
    h+='<div style="padding:7px 0;border-bottom:1px solid var(--bd)">'
    +'<span class="mono" style="color:var(--tw);font-weight:700">'+t.code+'</span> '
    +(nm?'<span style="color:var(--mu);font-size:11px">'+nm+'</span> ':'')
    +'<b style="color:'+col+'">'+(t.ret>=0?'+':'')+(t.ret*100).toFixed(2)+'%</b>'
    +' <span style="color:var(--mu);font-size:11px">'+t.holdDays+'d | '
    +t.entryDate+' ~ '+t.exitDate+'</span>'
    +(t.sl?' <span style="color:var(--re);font-size:10px">[SL]</span>':'')
    +'</div>';
  });
  $('outlierContent').innerHTML=h;
  var m=$('outlierModal'); if(m)m.style.display='flex';
}

function closeOutlier(){
  var m=$('outlierModal'); if(m)m.style.display='none';
}

window.onload = toggleQuotaUI;
</script>
