<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>矛與盾 V7.8 — 資料庫管理版</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;600;700;900&display=swap');

*{box-sizing:border-box;margin:0;padding:0;}
:root{
--bg:#0a0c10; --surface:#12161f; --surface2:#1a2030; --border:#252d3d;
--border-hi:#3a4560; --text:#e2eaf8; --muted:#6b7a99; --dim:#3d4a66;
--green:#00e5a0; --green-dim:#003d2a; --red:#ff4d6d; --red-dim:#3d0012;
--yellow:#ffb830; --yellow-dim:#3d2900; --blue:#4d9fff; --blue-dim:#001a3d;
--accent:#7eb8ff; --gold:#ffd166; --white:#f8faff;
}

body{
font-family:'IBM Plex Sans',sans-serif; background:var(--bg); color:var(--text);
min-height:100vh; padding:24px 20px; line-height:1.6;
}
.mono{font-family:'IBM Plex Mono',monospace;}
.wrap{max-width:1200px;margin:0 auto;}

/* ── Header ── */
.hdr{
display:flex;justify-content:space-between;align-items:center;
border-bottom:2px solid var(--border-hi); padding-bottom:18px;margin-bottom:20px;
}
.hdr-title{font-size:22px;font-weight:900;color:var(--white);display:flex;align-items:center;gap:10px;}
.hdr-title span.v{font-size:12px;font-weight:600;background:var(--green);color:#000;padding:2px 8px;border-radius:3px;}
.hdr-sub{font-size:13px;color:var(--muted);margin-top:4px;}

/* ── 控制台與 Tabs ── */
.tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:2px solid var(--border); overflow-x: auto; white-space: nowrap;}
.tab{
padding:10px 22px;font-size:14px;font-weight:600;cursor:pointer;color:var(--muted);
border:none;border-bottom:3px solid transparent;background:none;transition:0.15s;
}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.panel{display:none;}.panel.active{display:block;}

.btn{padding:10px 24px;font-weight:700;cursor:pointer;border:2px solid;transition:0.15s;font-family:inherit;}
.btn-primary{background:var(--green);color:#000;border-color:var(--green); width: 100%; font-size: 15px;}
.btn-primary:hover{background:#00ffb3;}
.btn-outline{background:transparent;color:var(--accent);border-color:var(--accent); width: 100%; font-size: 15px;}
.btn-outline:hover{background:var(--accent);color:#000;}

/* ── 資料庫管理 UI ── */
.db-container { display: flex; gap: 20px; flex-wrap: wrap; }
.db-box { flex: 1; background: var(--surface); border: 1px solid var(--border); padding: 20px; min-width: 300px; }
.db-box h3 { font-size: 14px; color: var(--accent); margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 8px;}
.db-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
.db-item { display: flex; flex-direction: column; gap: 4px; }
.db-item label { font-size: 11px; color: var(--muted); font-weight: 700; text-transform: uppercase; }
.db-item input { background: var(--bg); border: 1px solid var(--border-hi); color: var(--white); padding: 8px; font-family: 'IBM Plex Mono'; font-size: 14px; }
.db-item input:focus { outline: none; border-color: var(--accent); }

/* ── 儀表板組件 ── */
.metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 12px; margin-bottom: 20px; }
.metric-card { background: var(--surface); border: 1px solid var(--border); padding: 16px; text-align: center; }
.metric-card.m-a { border-top: 3px solid var(--yellow); }
.metric-card.m-b { border-top: 3px solid var(--green); }
.metric-card.m-bh { border-top: 3px solid var(--muted); }
.m-title { font-size: 13px; color: var(--muted); font-weight: 700; margin-bottom: 12px; }
